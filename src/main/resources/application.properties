spring.application.name=heynannie
# ?????????????????????????????????????????
# APPLICATION
# ?????????????????????????????????????????
server.port=8080
server.servlet.context-path=/api

# ?????????????????????????????????????????
# DATABASE
# ?????????????????????????????????????????
spring.datasource.url=jdbc:postgresql://localhost:5432/nan_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ?????????????????????????????????????????
# JPA / HIBERNATE
# ?????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ?????????????????????????????????????????
# FLYWAY
# ?????????????????????????????????????????
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ?????????????????????????????????????????
# FILE UPLOAD
# ?????????????????????????????????????????
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ?????????????????????????????????????????
# MAIL
# ?????????????????????????????????????????
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ?????????????????????????????????????????
# JWT
# ?????????????????????????????????????????
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ?????????????????????????????????????????
imagekit.url-endpoint=${IMAGEKIT_URL_ENDPOINT}
imagekit.public-key=${IMAGEKIT_PUBLIC_KEY}
imagekit.private-key=${IMAGEKIT_PRIVATE_KEY}

# ?????????????????????????????????????????
# LOGGING
# ?????????????????????????????????????????
logging.level.com.nan=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ?????????????????????????????????????????
# APP CUSTOM CONFIG
# ?????????????????????????????????????????
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.document-verification.auto-approve=false
app.packages.p1=BASIC
app.packages.p2=VERIFIED
app.packages.p3=TRUSTED
app.packages.p4=SPECIALIZED
